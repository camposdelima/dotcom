<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DotCom — Connection Game</title>
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
  <div id="app">
    <header>
      <h1>DOTCOM</h1>
    </header>
    <div id="board-container">
      <canvas id="canvas"></canvas>
    </div>
    <div id="sidebar">
      <div id="score-bar">
        <span class="score-item">
          <span class="score-dot" style="background:#3498DB"></span>
          <span id="score-blue">0</span>
        </span>
        <span class="score-item">
          <span class="score-dot" style="background:#2ECC71"></span>
          <span id="score-green">0</span>
        </span>
        <button id="reset-score-btn">↻</button>
      </div>
      <div id="progress-bar">
        <div class="progress-content">
          <div class="progress-group">
            <span class="progress-label" style="color:#3498DB">Blue</span>
            <span class="progress-track"><span class="progress-fill" id="progress-blue-fill"></span></span>
            <span class="progress-val" id="progress-blue-val">0/6</span>
          </div>
          <div class="progress-group">
            <span class="progress-label" style="color:#2ECC71">Green</span>
            <span class="progress-track"><span class="progress-fill" id="progress-green-fill"></span></span>
            <span class="progress-val" id="progress-green-val">0/6</span>
          </div>
        </div>
        <button id="toggle-progress-btn" data-visible="1">◎</button>
      </div>
      <div id="info-bar">
        <div id="turn-indicator">
          <span id="turn-dot"></span>
          <span id="turn-text">Blue:</span>
          <button id="undo-btn">⟲</button>
        </div>
      </div>
      <div id="controls">
        <select id="size-select">
          <option value="5">5×5 (Easy)</option>
          <option value="7" selected>7×7 (Medium)</option>
          <option value="9">9×9 (Hard)</option>
          <option value="11">11×11 (Expert)</option>
        </select>
        <div id="bottom-actions">
          <button id="direction-toggle" class="dir-btn" title="Switch to Top ↔ Bottom">⟳</button>
          <button id="mode-toggle" class="mode-btn active">Drag</button>
          <button id="new-game">New Game</button>
        </div>
      </div>
    </div>
    <div id="message"></div>
  </div>
  <script src="js/game.js?v=2"></script>
  <script src="js/board.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
